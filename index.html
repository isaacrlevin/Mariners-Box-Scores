<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seattle Mariners — Box Scores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #00162C;
    --navy2:  #001E3C;
    --navy3:  #002B54;
    --teal:   #005C5C;
    --teal2:  #007A7A;
    --teal3:  #00A8A8;
    --gold:   #C4A45A;
    --gold2:  #E8C57A;
    --white:  #F0F4F8;
    --muted:  #7A9BB5;
    --dim:    #3A5468;
    --win:    #2ECC71;
    --loss:   #E74C3C;
    --card:   #001830;
    --border: rgba(0,168,168,0.18);
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--body);
    min-height: 100vh;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* ─── Grain overlay ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ─── Header ─────────────────────────────────────── */
  header {
    background: linear-gradient(180deg, #001A35 0%, var(--navy) 100%);
    border-bottom: 2px solid var(--teal);
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.9rem 0;
  }

  .logo-block {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .compass {
    width: 48px; height: 48px;
    flex-shrink: 0;
  }

  .site-title {
    font-family: var(--display);
    font-size: 1.9rem;
    letter-spacing: 0.06em;
    color: var(--white);
    line-height: 1;
  }

  .site-subtitle {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--teal3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .record-badge {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .record-num {
    font-family: var(--display);
    font-size: 2rem;
    letter-spacing: 0.04em;
    color: var(--gold2);
    line-height: 1;
  }

  .record-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .record-divider {
    width: 1px; height: 2rem;
    background: var(--dim);
  }

  /* ─── Search / Filter bar ────────────────────────── */
  .controls {
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    position: sticky;
    top: 70px;
    z-index: 99;
  }

  .controls-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }

  .search-wrap svg {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--navy3);
    border: 1px solid var(--dim);
    border-radius: 6px;
    padding: 0.5rem 0.75rem 0.5rem 2.25rem;
    color: var(--white);
    font-family: var(--body);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--teal3); }
  #searchInput::placeholder { color: var(--dim); }

  .month-tabs {
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
  }

  .month-btn {
    background: transparent;
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 0.35rem 0.75rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .month-btn:hover { border-color: var(--teal2); color: var(--teal3); }
  .month-btn.active {
    background: var(--teal);
    border-color: var(--teal);
    color: var(--white);
  }

  .result-filters {
    display: flex;
    gap: 0.3rem;
    margin-left: auto;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 0.35rem 0.65rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--white); color: var(--white); }
  .filter-btn.active-w { background: rgba(46,204,113,0.15); border-color: var(--win); color: var(--win); }
  .filter-btn.active-l { background: rgba(231,76,60,0.15); border-color: var(--loss); color: var(--loss); }

  /* ─── Main layout ────────────────────────────────── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 4rem;
  }

  .last-updated {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-align: right;
    margin-bottom: 1.25rem;
    text-transform: uppercase;
  }

  .game-count {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* ─── Game Cards ─────────────────────────────────── */
  .games-list { display: flex; flex-direction: column; gap: 0; }

  .month-section { margin-bottom: 2rem; }

  .month-heading {
    font-family: var(--display);
    font-size: 1.4rem;
    letter-spacing: 0.12em;
    color: var(--teal3);
    padding: 0.4rem 0 0.6rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }

  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.6rem;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .game-card:hover { border-color: var(--teal2); }

  .card-summary {
    display: grid;
    grid-template-columns: 140px 1fr auto;
    align-items: center;
    gap: 1rem;
    padding: 0.85rem 1.1rem;
    cursor: pointer;
    user-select: none;
  }

  /* Date block */
  .game-date-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .game-date-main {
    font-family: var(--display);
    font-size: 1.25rem;
    letter-spacing: 0.05em;
    color: var(--white);
    line-height: 1;
  }

  .game-date-day {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .game-venue {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--dim);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  /* Scoreboard center */
  .game-scoreboard {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    min-width: 0;
  }

  .score-matchup {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .team-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    min-width: 0;
  }

  .team-abbr {
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--muted);
    width: 36px;
    flex-shrink: 0;
  }

  .team-abbr.mariners { color: var(--teal3); }

  .team-name-full {
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score-divider-col { color: var(--dim); font-family: var(--mono); font-size: 0.75rem; }

  .final-score {
    font-family: var(--display);
    font-size: 1.5rem;
    letter-spacing: 0.04em;
    color: var(--white);
    text-align: center;
    min-width: 48px;
  }

  .final-score.winner { color: var(--gold2); }

  /* Mini line score */
  .mini-linescore {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--muted);
    display: flex;
    gap: 0.25rem;
    align-items: center;
    flex-wrap: nowrap;
    overflow-x: auto;
  }

  .mini-inning {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 18px;
  }

  .mini-inn-num { color: var(--dim); font-size: 0.55rem; }
  .mini-inn-run { color: var(--white); }
  .mini-inn-run.scored { color: var(--gold); }

  .mini-rhe {
    margin-left: auto;
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .rhe-col { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .rhe-label { font-size: 0.52rem; color: var(--dim); }
  .rhe-val { font-size: 0.7rem; color: var(--white); }

  /* Right side */
  .game-result-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    min-width: 52px;
  }

  .result-badge {
    font-family: var(--display);
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    width: 40px;
    height: 40px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-badge.W {
    background: rgba(46,204,113,0.12);
    border: 1px solid rgba(46,204,113,0.3);
    color: var(--win);
  }

  .result-badge.L {
    background: rgba(231,76,60,0.12);
    border: 1px solid rgba(231,76,60,0.3);
    color: var(--loss);
  }

  .expand-btn {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    padding: 2px;
    transition: color 0.2s, transform 0.25s;
    display: flex;
    align-items: center;
  }
  .expand-btn.open { transform: rotate(180deg); color: var(--teal3); }

  /* ─── Box Score Drawer ───────────────────────────── */
  .card-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
    border-top: 0px solid var(--border);
  }
  .card-detail.open {
    max-height: 2000px;
    border-top-width: 1px;
  }

  .detail-inner {
    padding: 1.1rem 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  /* Full linescore table */
  .linescore-wrap { overflow-x: auto; }

  .linescore-table {
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 0.78rem;
    min-width: 100%;
    white-space: nowrap;
  }

  .linescore-table th {
    color: var(--dim);
    font-weight: 400;
    padding: 0.25rem 0.5rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .linescore-table td {
    padding: 0.3rem 0.5rem;
    text-align: center;
    border-bottom: 1px solid rgba(0,168,168,0.07);
  }

  .linescore-table td:first-child {
    text-align: left;
    font-weight: 600;
    color: var(--teal3);
    padding-left: 0;
  }

  .linescore-table th:first-child { text-align: left; padding-left: 0; }

  .linescore-table .totals-col {
    border-left: 1px solid var(--border);
    font-weight: 600;
    color: var(--white);
  }

  .linescore-table .winner-row td { color: var(--gold); }
  .linescore-table .loser-row td { color: var(--muted); }

  /* Decisions */
  .decisions-row {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  .decision-item { display: flex; gap: 0.5rem; align-items: baseline; }
  .decision-label { color: var(--dim); letter-spacing: 0.08em; font-size: 0.65rem; text-transform: uppercase; }
  .decision-name { color: var(--white); }
  .decision-name.win { color: var(--win); }
  .decision-name.loss { color: var(--loss); }
  .decision-name.save { color: var(--gold); }

  /* Batting / Pitching tabs */
  .detail-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }

  .detail-tab {
    background: none;
    border: none;
    padding: 0.5rem 1rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .detail-tab:hover { color: var(--white); }
  .detail-tab.active { color: var(--teal3); border-bottom-color: var(--teal3); }

  .detail-panel { display: none; }
  .detail-panel.active { display: block; }

  .team-section-label {
    font-family: var(--display);
    font-size: 1rem;
    letter-spacing: 0.1em;
    color: var(--teal3);
    margin-bottom: 0.5rem;
  }

  /* Box score tables */
  .box-table-wrap { overflow-x: auto; margin-bottom: 1.25rem; }

  .box-table {
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 0.73rem;
    min-width: 100%;
    white-space: nowrap;
  }

  .box-table thead tr { border-bottom: 1px solid var(--border); }

  .box-table th {
    padding: 0.25rem 0.5rem;
    color: var(--dim);
    font-weight: 400;
    text-align: right;
    letter-spacing: 0.06em;
  }
  .box-table th:first-child { text-align: left; }
  .box-table th.pos-col { text-align: center; }

  .box-table td {
    padding: 0.28rem 0.5rem;
    text-align: right;
    border-bottom: 1px solid rgba(0,168,168,0.06);
    color: var(--muted);
  }

  .box-table td:first-child { text-align: left; color: var(--white); }
  .box-table td.pos-col { text-align: center; color: var(--dim); }

  .box-table tbody tr:hover td { background: rgba(0,168,168,0.05); }

  /* ─── Loading / Error states ─────────────────────── */
  .state-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 40vh;
    gap: 1rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
  }

  .loading-spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--dim);
    border-top-color: var(--teal3);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── No results ─────────────────────────────────── */
  .no-results {
    text-align: center;
    color: var(--dim);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 3rem;
    letter-spacing: 0.1em;
  }

  /* ─── Crochet Square Visualization ─────────────────── */
  .square-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 0;
  }

  .game-square-canvas {
    border-radius: 4px;
    border: 1px solid var(--border);
    max-width: 100%;
    height: auto;
    display: block;
  }

  .square-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1.25rem;
    justify-content: center;
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  /* ─── Completed state ───────────────────────────────── */
  .game-card.completed {
    opacity: 0.55;
    filter: grayscale(0.4);
  }
  .game-card.completed .card-summary {
    background: rgba(0,0,0,0.15);
  }

  .completed-check {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border: 1px solid var(--dim);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }
  .completed-check:hover { border-color: var(--teal3); }
  .completed-check:checked {
    background: var(--teal);
    border-color: var(--teal);
  }
  .completed-check:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 5px;
    height: 9px;
    border: 2px solid var(--white);
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  /* ─── Responsive ─────────────────────────────────── */
  @media (max-width: 640px) {
    .card-summary {
      grid-template-columns: 100px 1fr auto;
      gap: 0.5rem;
      padding: 0.75rem 0.75rem;
    }
    .mini-linescore { display: none; }
    .site-title { font-size: 1.5rem; }
    .record-num { font-size: 1.6rem; }
    .record-badge { gap: 0.5rem; }
    .controls-inner { gap: 0.5rem; }
    .result-filters { margin-left: 0; }
    main { padding: 1rem 0.75rem 4rem; }
    .controls { padding: 0.65rem 0.75rem; }
  }

  @media (max-width: 480px) {
    .compass { width: 38px; height: 38px; }
    .site-title { font-size: 1.3rem; }
    .record-num { font-size: 1.4rem; }
    .record-label { font-size: 0.55rem; }
    .card-summary {
      grid-template-columns: 88px 1fr auto;
      gap: 0.4rem;
      padding: 0.65rem 0.6rem;
    }
    .game-date-main { font-size: 1.1rem; }
    main { padding: 0.75rem 0.5rem 3rem; }
    .controls { padding: 0.5rem 0.5rem; }
    .search-wrap { min-width: 0; }
    .result-badge { width: 34px; height: 34px; font-size: 1.2rem; }
    .game-result-col { min-width: 44px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-block">
      <!-- Mariners compass trident SVG -->
      <svg class="compass" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="23" stroke="#005C5C" stroke-width="1.5"/>
        <circle cx="24" cy="24" r="18" stroke="#003366" stroke-width="1"/>
        <!-- Trident / compass needle -->
        <path d="M24 6 L27 18 L24 15 L21 18 Z" fill="#00A8A8"/>
        <path d="M24 42 L21 30 L24 33 L27 30 Z" fill="#003366"/>
        <path d="M6 24 L18 21 L15 24 L18 27 Z" fill="#005C5C"/>
        <path d="M42 24 L30 27 L33 24 L30 21 Z" fill="#005C5C"/>
        <circle cx="24" cy="24" r="3" fill="#00A8A8"/>
        <circle cx="24" cy="24" r="1.5" fill="#001E3C"/>
      </svg>
      <div>
        <div class="site-title">SEATTLE MARINERS</div>
        <div class="site-subtitle" id="seasonLabel">2026 Box Scores</div>
      </div>
    </div>
    <div class="record-badge">
      <div>
        <div class="record-label">Record</div>
        <div class="record-num" id="recordDisplay">—</div>
      </div>
      <div class="record-divider"></div>
      <div>
        <div class="record-label">Win%</div>
        <div class="record-num" id="winPctDisplay">—</div>
      </div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search opponent or date…">
    </div>
    <div class="month-tabs" id="monthTabs">
      <button class="month-btn active" data-month="ALL">ALL</button>
    </div>
    <div class="result-filters">
      <button class="filter-btn" id="filterAll" data-filter="ALL">ALL</button>
      <button class="filter-btn" id="filterW" data-filter="W">W</button>
      <button class="filter-btn" id="filterL" data-filter="L">L</button>
    </div>
  </div>
</div>

<main>
  <div class="last-updated" id="lastUpdated"></div>
  <div class="game-count" id="gameCount"></div>
  <div id="stateScreen" class="state-screen">
    <div class="loading-spinner"></div>
    <div>LOADING GAME DATA</div>
  </div>
  <div id="gamesList" class="games-list" style="display:none"></div>
</main>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allGames = [];
let activeMonth = 'ALL';
let activeFilter = 'ALL';
let searchQuery = '';

// ── Completed Games (persisted to localStorage) ───────────────────────────────
const COMPLETED_KEY = 'mariners-completed-games';
let completedGames = new Set(JSON.parse(localStorage.getItem(COMPLETED_KEY) || '[]'));

function saveCompleted() {
  localStorage.setItem(COMPLETED_KEY, JSON.stringify([...completedGames]));
}

function gameKey(g) {
  return g.gamePk ? String(g.gamePk) : `${g.date}-${g.opponent?.abbr || 'OPP'}-${g.isHome ? 'H' : 'A'}`;
}

const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtDate(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return {
    month: dt.toLocaleString('en-US', {month:'short'}).toUpperCase(),
    day: d,
    dayOfWeek: dt.toLocaleString('en-US', {weekday:'short'}).toUpperCase(),
    monthNum: m,
    full: dt.toLocaleString('en-US', {month:'long', day:'numeric'}),
  };
}

function safeNum(v) {
  return (v === null || v === undefined) ? '—' : v;
}

// ── Render line score table ──────────────────────────────────────────────────
function renderLinescore(ls, isHome, oppName) {
  if (!ls || !ls.innings || ls.innings.length === 0) return '<em style="color:var(--dim);font-family:var(--mono);font-size:0.75rem">Line score not available</em>';

  const seaSide  = isHome ? 'home' : 'away';
  const oppSide  = isHome ? 'away' : 'home';
  const seaScore = ls[seaSide]?.runs;
  const oppScore = ls[oppSide]?.runs;
  const seaWin   = seaScore > oppScore;

  let headerCells = '<th></th>';
  ls.innings.forEach(inn => { headerCells += `<th>${inn.num}</th>`; });
  headerCells += '<th class="totals-col">R</th><th class="totals-col">H</th><th class="totals-col">E</th>';

  function teamRow(side, label, isWinner) {
    const cls = isWinner ? 'winner-row' : 'loser-row';
    let cells = `<td>${label}</td>`;
    ls.innings.forEach(inn => {
      const v = inn[side];
      cells += `<td>${v !== null && v !== undefined ? v : '—'}</td>`;
    });
    const tot = ls[side];
    cells += `<td class="totals-col">${safeNum(tot?.runs)}</td>`;
    cells += `<td class="totals-col">${safeNum(tot?.hits)}</td>`;
    cells += `<td class="totals-col">${safeNum(tot?.errors)}</td>`;
    return `<tr class="${cls}">${cells}</tr>`;
  }

  const awayLabel = isHome ? oppName : 'SEA';
  const homeLabel = isHome ? 'SEA' : oppName;
  const awayWin   = isHome ? !seaWin : seaWin;
  const homeWin   = isHome ? seaWin : !seaWin;

  return `
    <div class="linescore-wrap">
      <table class="linescore-table">
        <thead><tr>${headerCells}</tr></thead>
        <tbody>
          ${teamRow('away', awayLabel, awayWin)}
          ${teamRow('home', homeLabel, homeWin)}
        </tbody>
      </table>
    </div>`;
}

// ── Render batting table ─────────────────────────────────────────────────────
function renderBatterTable(batters) {
  if (!batters || !batters.length) return '<div style="color:var(--dim);font-family:var(--mono);font-size:0.75rem;padding:0.5rem 0">No data available</div>';
  const rows = batters.map(b => `
    <tr>
      <td>${b.name || '—'}</td>
      <td class="pos-col">${b.pos || '—'}</td>
      <td>${safeNum(b.ab)}</td><td>${safeNum(b.r)}</td><td>${safeNum(b.h)}</td>
      <td>${safeNum(b.rbi)}</td><td>${safeNum(b.bb)}</td><td>${safeNum(b.so)}</td>
      <td>${b.avg || '—'}</td>
    </tr>`).join('');
  return `
    <div class="box-table-wrap">
      <table class="box-table">
        <thead><tr>
          <th>BATTER</th><th class="pos-col">POS</th>
          <th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>SO</th><th>AVG</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── Render pitching table ────────────────────────────────────────────────────
function renderPitcherTable(pitchers) {
  if (!pitchers || !pitchers.length) return '<div style="color:var(--dim);font-family:var(--mono);font-size:0.75rem;padding:0.5rem 0">No data available</div>';
  const rows = pitchers.map(p => `
    <tr>
      <td>${p.name || '—'}</td>
      <td>${safeNum(p.ip)}</td><td>${safeNum(p.h)}</td><td>${safeNum(p.r)}</td>
      <td>${safeNum(p.er)}</td><td>${safeNum(p.bb)}</td><td>${safeNum(p.so)}</td>
      <td>${p.era || '—'}</td>
    </tr>`).join('');
  return `
    <div class="box-table-wrap">
      <table class="box-table">
        <thead><tr>
          <th>PITCHER</th>
          <th>IP</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>SO</th><th>ERA</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── Crochet Square ───────────────────────────────────────────────────────────
const SQ_COLORS = {
  tied:    '#9AAAB6',  // light gray
  winning: '#1AABCC',  // bright cyan-teal
  losing:  '#1A3A8A',  // dark royal blue
  gold:    '#E8A030',  // warm orange-gold
  noData:  '#333333',  // fallback for unknown state
};
const SQ_BG      = '#000D1A';
const SQ_NO_DATA_TEXT = '#3A5468';

function computeInningColors(g) {
  const ls = g.linescore;
  if (!ls || !ls.innings || ls.innings.length === 0) return [];
  const seaSide = g.isHome ? 'home' : 'away';
  const oppSide = g.isHome ? 'away' : 'home';
  let seaTotal = 0, oppTotal = 0;
  return ls.innings.map((inn, idx) => {
    seaTotal += (inn[seaSide] ?? 0);
    oppTotal += (inn[oppSide] ?? 0);
    const isLast = idx === ls.innings.length - 1;
    if (isLast && g.result === 'W') return 'gold';
    if (seaTotal > oppTotal) return 'winning';
    if (seaTotal < oppTotal) return 'losing';
    return 'tied';
  });
}

function drawCrochetSquare(canvas, colors) {
  const ctx = canvas.getContext('2d');
  const S   = canvas.width;
  const N   = colors.length;

  ctx.clearRect(0, 0, S, S);

  // Background
  ctx.fillStyle = SQ_BG;
  ctx.fillRect(0, 0, S, S);

  if (N === 0) {
    ctx.fillStyle = SQ_NO_DATA_TEXT;
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No linescore data', S / 2, S / 2);
    return;
  }

  const pad   = 10;
  const avail = S - 2 * pad;
  const thick = avail / 2 / N;

  // Draw rings from outside in:
  // colors[N-1] = last inning  → outermost ring
  // colors[0]   = first inning → center ring
  for (let i = N - 1; i >= 0; i--) {
    const ringOffset = N - 1 - i; // 0 for outermost, N-1 for center
    const x    = pad + ringOffset * thick;
    const size = avail - 2 * ringOffset * thick;
    ctx.fillStyle = SQ_COLORS[colors[i]] || SQ_COLORS.noData;
    ctx.fillRect(x, x, size, size);
  }

  // Draw thin separator lines between rings to delineate innings
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= N; i++) {
    const x    = pad + i * thick;
    const size = avail - 2 * i * thick;
    if (size >= 0) ctx.strokeRect(x + 0.5, x + 0.5, size, size);
  }
}

// ── Build expandable detail section ─────────────────────────────────────────
function buildDetail(g) {
  const oppAbbr = g.opponent?.abbr || g.opponent?.name?.split(' ').pop() || 'OPP';
  const lsHtml  = renderLinescore(g.linescore, g.isHome, oppAbbr);

  const dec = g.decisions || {};
  let decisionsHtml = '';
  if (dec.winner || dec.loser || dec.save) {
    decisionsHtml = '<div class="decisions-row">';
    if (dec.winner) decisionsHtml += `<div class="decision-item"><span class="decision-label">W</span><span class="decision-name win">${dec.winner}</span></div>`;
    if (dec.loser)  decisionsHtml += `<div class="decision-item"><span class="decision-label">L</span><span class="decision-name loss">${dec.loser}</span></div>`;
    if (dec.save)   decisionsHtml += `<div class="decision-item"><span class="decision-label">SV</span><span class="decision-name save">${dec.save}</span></div>`;
    decisionsHtml += '</div>';
  }

  const batters  = g.batters  || {};
  const pitchers = g.pitchers || {};
  const awayLabel = batters.awayLabel || 'Away';
  const homeLabel = batters.homeLabel || 'Home';

  const battingHtml = `
    <div>
      <div class="team-section-label">${awayLabel}</div>
      ${renderBatterTable(batters.away || [])}
      <div class="team-section-label" style="margin-top:1rem">${homeLabel}</div>
      ${renderBatterTable(batters.home || [])}
    </div>`;

  const pitchingHtml = `
    <div>
      <div class="team-section-label">${awayLabel}</div>
      ${renderPitcherTable(pitchers.away || [])}
      <div class="team-section-label" style="margin-top:1rem">${homeLabel}</div>
      ${renderPitcherTable(pitchers.home || [])}
    </div>`;

  return `
    <div class="detail-inner">
      ${lsHtml}
      ${decisionsHtml}
      <div>
        <div class="detail-tabs">
          <button class="detail-tab active" data-panel="batting">BATTING</button>
          <button class="detail-tab" data-panel="pitching">PITCHING</button>
          <button class="detail-tab" data-panel="square">SQUARE</button>
        </div>
        <div class="detail-panel active" data-panel-id="batting">${battingHtml}</div>
        <div class="detail-panel" data-panel-id="pitching">${pitchingHtml}</div>
        <div class="detail-panel" data-panel-id="square">
          <div class="square-panel">
            <canvas class="game-square-canvas" width="300" height="300"></canvas>
            <div class="square-legend">
              <div class="legend-item"><div class="legend-swatch" style="background:#9AAAB6"></div><span>TIED</span></div>
              <div class="legend-item"><div class="legend-swatch" style="background:#1AABCC"></div><span>WINNING</span></div>
              <div class="legend-item"><div class="legend-swatch" style="background:#1A3A8A"></div><span>LOSING</span></div>
              <div class="legend-item"><div class="legend-swatch" style="background:#E8A030"></div><span>WON (FINAL)</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

// ── Build a single game card ─────────────────────────────────────────────────
function buildCard(g) {
  const dt = fmtDate(g.date);
  const isHome   = g.isHome;
  const oppAbbr  = g.opponent?.abbr || g.opponent?.name?.split(' ').pop() || 'OPP';
  const oppName  = g.opponent?.name || 'Opponent';
  const seaScore = g.mariners?.score;
  const oppScore = g.opponent_score;
  const result   = g.result;
  const seaWins  = result === 'W';

  const awayAbbr  = isHome ? oppAbbr : 'SEA';
  const homeAbbr  = isHome ? 'SEA'   : oppAbbr;
  const awayName  = isHome ? oppName : 'Seattle Mariners';
  const homeName  = isHome ? 'Seattle Mariners' : oppName;
  const awayScore = isHome ? oppScore : seaScore;
  const homeScore = isHome ? seaScore : oppScore;
  const awayWins  = isHome ? !seaWins : seaWins;
  const homeWins  = isHome ?  seaWins : !seaWins;

  // Mini-linescore: Mariners' runs per inning
  const ls = g.linescore;
  let miniLS = '';
  if (ls?.innings?.length) {
    const seaSide = isHome ? 'home' : 'away';
    ls.innings.forEach(inn => {
      const runs   = inn[seaSide];
      const scored = runs > 0;
      miniLS += `<div class="mini-inning">
        <div class="mini-inn-num">${inn.num}</div>
        <div class="mini-inn-run${scored ? ' scored' : ''}">${runs !== null && runs !== undefined ? runs : '·'}</div>
      </div>`;
    });
    const mySide = ls[seaSide];
    if (mySide) {
      miniLS += `<div class="mini-rhe">
        <div class="rhe-col"><div class="rhe-label">R</div><div class="rhe-val">${safeNum(mySide.runs)}</div></div>
        <div class="rhe-col"><div class="rhe-label">H</div><div class="rhe-val">${safeNum(mySide.hits)}</div></div>
        <div class="rhe-col"><div class="rhe-label">E</div><div class="rhe-val">${safeNum(mySide.errors)}</div></div>
      </div>`;
    }
  }

  const card = document.createElement('div');
  card.className = 'game-card';
  card.innerHTML = `
    <div class="card-summary">
      <div>
        <div class="game-date-block">
          <div class="game-date-main">${dt.month} ${dt.day}</div>
          <div class="game-date-day">${dt.dayOfWeek} · ${isHome ? 'HOME' : 'AWAY'}</div>
        </div>
        <div class="game-venue">${g.venue || ''}</div>
      </div>
      <div class="game-scoreboard">
        <div class="score-matchup">
          <div style="display:flex;flex-direction:column;gap:0.3rem;flex:1;min-width:0">
            <div class="team-row">
              <span class="team-abbr${awayAbbr === 'SEA' ? ' mariners' : ''}">${awayAbbr}</span>
              <span class="team-name-full">${awayName}</span>
            </div>
            <div class="team-row">
              <span class="team-abbr${homeAbbr === 'SEA' ? ' mariners' : ''}">${homeAbbr}</span>
              <span class="team-name-full">${homeName}</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:0.3rem;align-items:flex-end">
            <div class="final-score${awayWins ? ' winner' : ''}">${safeNum(awayScore)}</div>
            <div class="final-score${homeWins ? ' winner' : ''}">${safeNum(homeScore)}</div>
          </div>
        </div>
        <div class="mini-linescore">${miniLS}</div>
      </div>
      <div class="game-result-col">
        <div class="result-badge ${result}">${result}</div>
        <input type="checkbox" class="completed-check" title="Mark as completed" aria-label="Mark box score as completed">
        <button class="expand-btn" aria-label="Toggle box score">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
    </div>
    <div class="card-detail">${buildDetail(g)}</div>`;

  // Completed checkbox
  const key = gameKey(g);
  const checkbox = card.querySelector('.completed-check');
  checkbox.checked = completedGames.has(key);
  if (checkbox.checked) card.classList.add('completed');
  checkbox.addEventListener('click', e => e.stopPropagation());
  checkbox.addEventListener('change', () => {
    if (checkbox.checked) {
      completedGames.add(key);
      card.classList.add('completed');
    } else {
      completedGames.delete(key);
      card.classList.remove('completed');
    }
    saveCompleted();
  });

  // Expand / collapse on summary click
  const summary   = card.querySelector('.card-summary');
  const detail    = card.querySelector('.card-detail');
  const expandBtn = card.querySelector('.expand-btn');
  summary.addEventListener('click', () => {
    const open = detail.classList.toggle('open');
    expandBtn.classList.toggle('open', open);
  });

  // Tab switching inside detail (stop click bubbling to summary)
  card.querySelectorAll('.detail-tab').forEach(tab => {
    tab.addEventListener('click', e => {
      e.stopPropagation();
      const panelId  = tab.dataset.panel;
      const detailEl = tab.closest('.card-detail');
      detailEl.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
      detailEl.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const targetPanel = detailEl.querySelector(`[data-panel-id="${panelId}"]`);
      targetPanel?.classList.add('active');
      if (panelId === 'square') {
        const cvs = targetPanel?.querySelector('.game-square-canvas');
        if (cvs && !cvs.dataset.drawn) {
          drawCrochetSquare(cvs, computeInningColors(g));
          cvs.dataset.drawn = '1';
        }
      }
    });
  });

  return card;
}

// ── Month tabs ───────────────────────────────────────────────────────────────
function buildMonthTabs() {
  const months = new Set(allGames.map(g => g.date.slice(0, 7)));
  const container = document.getElementById('monthTabs');
  container.innerHTML = '<button class="month-btn active" data-month="ALL">ALL</button>';
  [...months].sort().forEach(ym => {
    const [, m] = ym.split('-').map(Number);
    const btn = document.createElement('button');
    btn.className = 'month-btn';
    btn.dataset.month = ym;
    btn.textContent = MONTHS[m - 1];
    container.appendChild(btn);
  });
  container.querySelectorAll('.month-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeMonth = btn.dataset.month;
      renderAll();
    });
  });
}

// ── Main render ──────────────────────────────────────────────────────────────
function renderAll() {
  let games = [...allGames];

  if (activeMonth !== 'ALL') {
    games = games.filter(g => g.date.startsWith(activeMonth));
  }
  if (activeFilter !== 'ALL') {
    games = games.filter(g => g.result === activeFilter);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    games = games.filter(g =>
      g.opponent?.name?.toLowerCase().includes(q) ||
      g.opponent?.abbr?.toLowerCase().includes(q) ||
      g.date?.includes(q)
    );
  }

  document.getElementById('gameCount').textContent =
    games.length === 0 ? '' : `Showing ${games.length} game${games.length === 1 ? '' : 's'}`;

  const list = document.getElementById('gamesList');
  if (games.length === 0) {
    list.innerHTML = '<div class="no-results">NO GAMES MATCH YOUR FILTERS</div>';
    return;
  }

  // Group by year-month, most recent first
  const grouped = {};
  games.forEach(g => {
    const ym = g.date.slice(0, 7);
    if (!grouped[ym]) grouped[ym] = [];
    grouped[ym].push(g);
  });

  list.innerHTML = '';
  Object.keys(grouped).sort().reverse().forEach(ym => {
    const [y, m] = ym.split('-').map(Number);
    const section = document.createElement('div');
    section.className = 'month-section';
    const heading = document.createElement('div');
    heading.className = 'month-heading';
    heading.textContent = `${MONTHS[m - 1]} ${y}`;
    section.appendChild(heading);
    [...grouped[ym]].reverse().forEach(g => section.appendChild(buildCard(g)));
    list.appendChild(section);
  });
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function init() {
  const stateScreen = document.getElementById('stateScreen');
  const gamesList   = document.getElementById('gamesList');
  try {
    const resp = await fetch('data/scores.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // Only completed regular season games
    allGames = (data.games || []).filter(g => g.isFinal && g.gameType === 'R');

    // Header
    const season = data.season || new Date().getFullYear();
    document.getElementById('seasonLabel').textContent = `${season} Box Scores`;

    // Recompute record from regular-season games only (allGames is already filtered)
    const wins_rs   = allGames.filter(g => g.result === 'W').length;
    const losses_rs = allGames.filter(g => g.result === 'L').length;
    document.getElementById('recordDisplay').textContent = `${wins_rs}–${losses_rs}`;
    const total  = wins_rs + losses_rs;
    const winPct = total > 0
      ? (wins_rs / total).toFixed(3).replace(/^0/, '')
      : '.000';
    document.getElementById('winPctDisplay').textContent = winPct;

    if (data.lastUpdated) {
      const d = new Date(data.lastUpdated);
      document.getElementById('lastUpdated').textContent =
        `Updated ${d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles', timeZoneName: 'short' })}`;
    }

    buildMonthTabs();

    stateScreen.style.display = 'none';
    gamesList.style.display   = '';
    renderAll();
  } catch (err) {
    stateScreen.innerHTML = `
      <div style="color:var(--loss);font-family:var(--mono);text-align:center">
        <div style="font-size:1.5rem;margin-bottom:0.5rem">⚠</div>
        <div>FAILED TO LOAD DATA</div>
        <div style="font-size:0.7rem;color:var(--dim);margin-top:0.5rem">${err.message}</div>
      </div>`;
  }
}

// ── Event listeners ──────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderAll();
});

document.getElementById('filterAll').addEventListener('click', () => {
  activeFilter = 'ALL';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-w', 'active-l'));
  renderAll();
});

document.getElementById('filterW').addEventListener('click', () => {
  activeFilter = 'W';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-w', 'active-l'));
  document.getElementById('filterW').classList.add('active-w');
  renderAll();
});

document.getElementById('filterL').addEventListener('click', () => {
  activeFilter = 'L';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-w', 'active-l'));
  document.getElementById('filterL').classList.add('active-l');
  renderAll();
});

// ── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
